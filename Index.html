<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>
body{
    font-family:Arial;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#333;
    padding:20px;
    border-radius:15px;
    width:350px;
}

#display{
    width:100%;
    height:60px;
    font-size:28px;
    text-align:right;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    padding-right:10px;
}

button{
    width:23%;
    height:60px;
    margin:2px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.operator{background:#ff9500;color:white;}
.equal{background:#28a745;color:white;}
.clear{background:#dc3545;color:white;}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div>
<button class="clear" onclick="clr()">C</button>
<button onclick="del()">⌫</button>
<button onclick="insert('%')">%</button>
<button class="operator" onclick="insert('/')">÷</button>
</div>

<div>
<button onclick="insert('7')">7</button>
<button onclick="insert('8')">8</button>
<button onclick="insert('9')">9</button>
<button class="operator" onclick="insert('*')">×</button>
</div>

<div>
<button onclick="insert('4')">4</button>
<button onclick="insert('5')">5</button>
<button onclick="insert('6')">6</button>
<button class="operator" onclick="insert('-')">−</button>
</div>

<div>
<button onclick="insert('1')">1</button>
<button onclick="insert('2')">2</button>
<button onclick="insert('3')">3</button>
<button class="operator" onclick="insert('+')">+</button>
</div>

<div>
<button onclick="insert('0')">0</button>
<button onclick="insert('.')">.</button>
<button onclick="insert('(')">(</button>
<button onclick="insert(')')">)</button>
</div>

<div>
<button onclick="sqrt()">√</button>
<button onclick="square()">x²</button>
<button onclick="power()">xʸ</button>
<button onclick="insert('Math.PI')">π</button>
</div>

<div>
<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="insert('Math.E')">e</button>
</div>

<div>
<button style="width:48%" onclick="fact()">n!</button>
<button style="width:48%" class="equal" onclick="calc()">=</button>
</div>

</div>

<script>

function insert(val){
document.getElementById("display").value += val;
}

function clr(){
document.getElementById("display").value="";
}

function del(){
let d=document.getElementById("display");
d.value=d.value.slice(0,-1);
}

function calc(){
let d=document.getElementById("display");
try{
d.value=eval(d.value);
}
catch{
d.value="Error";
}
}

function sqrt(){
let d=document.getElementById("display");
d.value=Math.sqrt(eval(d.value));
}

function square(){
let d=document.getElementById("display");
d.value=Math.pow(eval(d.value),2);
}

function power(){
insert("**");
}

function sin(){
let d=document.getElementById("display");
d.value=Math.sin(eval(d.value)*Math.PI/180);
}

function cos(){
let d=document.getElementById("display");
d.value=Math.cos(eval(d.value)*Math.PI/180);
}

function tan(){
let d=document.getElementById("display");
d.value=Math.tan(eval(d.value)*Math.PI/180);
}

function fact(){
let n=eval(document.getElementById("display").value);
let f=1;
for(let i=1;i<=n;i++) f*=i;
document.getElementById("display").value=f;
}

</script>

</body>
  </html>
